<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>קביעת תור | עדנה</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/book.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&family=Frank+Ruhl+Libre:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="header scrolled" id="header">
    <nav class="nav container">
      <a href="index.html" class="nav-logo">עדנה</a>
      <a href="index.html" class="btn btn-outline-dark">← חזרה לאתר</a>
    </nav>
  </header>

  <main class="book-main">
    <div class="container">
      <div class="book-header">
        <span class="section-tag">קביעת תור</span>
        <h1 class="section-title">בחרי תאריך ושעה</h1>
        <p class="book-sub">מלאי את הפרטים ואחזור אלייך לאישור בהקדם</p>
      </div>

      <form class="book-form" id="book-form">

        <div class="form-row">
          <div class="form-group">
            <label for="name">שם מלא *</label>
            <input type="text" id="name" placeholder="שם מלא" required />
          </div>
          <div class="form-group">
            <label for="phone">טלפון *</label>
            <input type="tel" id="phone" placeholder="050-0000000" required />
          </div>
        </div>

        <div class="form-group">
          <label for="service">סוג טיפול *</label>
          <select id="service" required>
            <option value="">בחרי טיפול...</option>
            <option value="עיסוי רפואי – כאבי גב וצוואר">עיסוי רפואי – כאבי גב וצוואר</option>
            <option value="עיסוי רפואי – שכמות ושרירים תפוסים">עיסוי רפואי – שכמות ושרירים תפוסים</option>
            <option value="עיסוי רפואי – פריצת דיסק">עיסוי רפואי – פריצת דיסק</option>
            <option value="פיברומיאלגיה">פיברומיאלגיה</option>
            <option value="הקלה בלחץ וחרדה">הקלה בלחץ וחרדה</option>
            <option value="עיסוי לנשים הרות">עיסוי לנשים הרות</option>
            <option value="ייעוץ ראשוני">ייעוץ ראשוני</option>
          </select>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="date">תאריך *</label>
            <input type="date" id="date" required />
          </div>
          <div class="form-group">
            <label>שעה *</label>
            <div class="time-slots" id="time-slots">
              <p class="slots-hint">בחרי תאריך תחילה</p>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="notes">הערות</label>
          <textarea id="notes" rows="3" placeholder="כל מידע רלוונטי שתרצי לשתף..."></textarea>
        </div>

        <input type="hidden" id="selected-time" />

        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">שלחי בקשת תור</button>

        <div class="form-success" id="form-success">
          ✅ הבקשה נשלחה! עדנה תחזור אלייך בהקדם לאישור התור.
        </div>
        <div class="form-error" id="form-error"></div>

      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/booking.js"></script>
</body>
</html>
